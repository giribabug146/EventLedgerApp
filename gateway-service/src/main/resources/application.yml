server:
  port: 8080

spring:
  application:
    name: gateway-service
  datasource:
    url: jdbc:h2:mem:gatewaydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

account-service:
  base-url: http://localhost:8081

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,circuitbreakers,retries
      base-path: /
      path-mapping:
        health: health
        metrics: metrics

resilience4j:
  circuitbreaker:
    instances:
      accountService:
        sliding-window-size: 4
        minimum-number-of-calls: 2
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 1
  retry:
    instances:
      accountService:
        max-attempts: 2
        wait-duration: 200ms
  timelimiter:
    instances:
      accountService:
        timeout-duration: 2s

logging:
  level:
    root: INFO
